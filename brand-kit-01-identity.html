<!DOCTYPE html><html><head><meta charset="UTF-8">

<style>


*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --accent: #0d9488;
  --text: #f5f2ee;
  --muted: rgba(245,242,238,0.45);
  --border: rgba(245,242,238,0.08);
  --body: 'Space Grotesk', 'Space Grotesk', sans-serif;
  --display: 'Satoshi', serif;
}
body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
}
.slide {
  width: 1920px;
  height: 1080px;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  padding: 64px 80px 56px;
  position: relative;
}
.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0;
}
.hud-label {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.accent-line {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent);
}
.section-label {
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 48px;
}

.content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 80px;
}
.left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0;
}
.brand-eyebrow {
  font-size: 12px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 20px;
}
.logo-img {
  max-width: 400px;
  max-height: 200px;
  object-fit: contain;
  margin-bottom: 32px;
}
.logo-text { margin-bottom: 32px; }
.logo-main {
  display: block;
  font-family: var(--display);
  font-size: 96px;
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 0.9;
  color: var(--text);
}
.logo-sub {
  display: block;
  font-family: var(--body);
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-top: 10px;
}
.rule {
  width: 48px;
  height: 2px;
  background: var(--accent);
  margin-bottom: 24px;
}
.tagline {
  font-size: 16px;
  color: var(--muted);
  line-height: 1.65;
  max-width: 440px;
  font-weight: 300;
  letter-spacing: 0.01em;
}
.right {
  width: 400px;
  height: 400px;
  border: 1px solid var(--border);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.right::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 60% 40%, rgba(13,148,136,0.08) 0%, transparent 70%);
}
.right-brand {
  font-family: var(--display);
  font-size: 48px;
  font-weight: 800;
  letter-spacing: -0.04em;
  color: var(--text);
  line-height: 1;
  text-align: center;
}
.right-year {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}
.corner-accent {
  position: absolute;
  bottom: 0; right: 0;
  width: 80px; height: 80px;
  background: var(--accent);
  clip-path: polygon(100% 0, 100% 100%, 0 100%);
}
</style></head><body>

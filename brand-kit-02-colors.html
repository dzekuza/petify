<!DOCTYPE html><html><head><meta charset="UTF-8">

<style>


*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --accent: #0d9488;
  --text: #f5f2ee;
  --muted: rgba(245,242,238,0.45);
  --border: rgba(245,242,238,0.08);
  --body: 'Space Grotesk', 'Space Grotesk', sans-serif;
  --display: 'Satoshi', serif;
}
body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
}
.slide {
  width: 1920px;
  height: 1080px;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  padding: 64px 80px 56px;
  position: relative;
}
.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0;
}
.hud-label {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.accent-line {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent);
}
.section-label {
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 48px;
}

.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.swatches {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 32px 48px;
}
.swatch {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.swatch-circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  flex-shrink: 0;
}
.swatch-info {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.swatch-name {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.02em;
}
.swatch-hex {
  font-size: 12px;
  font-family: 'Courier New', monospace;
  color: var(--muted);
  letter-spacing: 0.08em;
}
.swatch-role {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--muted);
  opacity: 0.6;
}
</style></head><body>
<div class="slide">
  <div class="hud">
    <span class="hud-label">Color Palette</span>
    <span class="hud-label">02 — 03</span>
  </div>
  <div class="content">
    <div class="section-label">Brand Colors</div>
    <div class="swatches">
      
        <div class="swatch">
          <div class="swatch-circle" style="background:#0d9488;box-shadow: inset 0 0 0 1px rgba(245,242,238,0.15);"></div>
          <div class="swatch-info">
            <div class="swatch-name">Brand Teal</div>
            <div class="swatch-hex">#0D9488</div>
            <div class="swatch-role">Accent</div>
          </div>
        </div>
        <div class="swatch">
          <div class="swatch-circle" style="background:#f0fdfa;"></div>
          <div class="swatch-info">
            <div class="swatch-name">Teal Light</div>
            <div class="swatch-hex">#F0FDFA</div>
            <div class="swatch-role">Surface</div>
          </div>
        </div>
        <div class="swatch">
          <div class="swatch-circle" style="background:#ffffff;"></div>
          <div class="swatch-info">
            <div class="swatch-name">Background</div>
            <div class="swatch-hex">#FFFFFF</div>
            <div class="swatch-role">Background</div>
          </div>
        </div>
        <div class="swatch">
          <div class="swatch-circle" style="background:#ef4444;box-shadow: inset 0 0 0 1px rgba(245,242,238,0.15);"></div>
          <div class="swatch-info">
            <div class="swatch-name">Primary Red</div>
            <div class="swatch-hex">#EF4444</div>
            <div class="swatch-role">Primary</div>
          </div>
        </div>
        <div class="swatch">
          <div class="swatch-circle" style="background:#3b82f6;box-shadow: inset 0 0 0 1px rgba(245,242,238,0.15);"></div>
          <div class="swatch-info">
            <div class="swatch-name">Accent Blue</div>
            <div class="swatch-hex">#3B82F6</div>
            <div class="swatch-role">Secondary</div>
          </div>
        </div>
        <div class="swatch">
          <div class="swatch-circle" style="background:#8b5cf6;box-shadow: inset 0 0 0 1px rgba(245,242,238,0.15);"></div>
          <div class="swatch-info">
            <div class="swatch-name">Accent Purple</div>
            <div class="swatch-hex">#8B5CF6</div>
            <div class="swatch-role">Highlight</div>
          </div>
        </div>
    </div>
  </div>
  <div class="accent-line"></div>
</div>
</body></html>

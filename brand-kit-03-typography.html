<!DOCTYPE html><html><head><meta charset="UTF-8">

<style>


*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --accent: #0d9488;
  --text: #f5f2ee;
  --muted: rgba(245,242,238,0.45);
  --border: rgba(245,242,238,0.08);
  --body: 'Space Grotesk', 'Space Grotesk', sans-serif;
  --display: 'Satoshi', serif;
}
body {
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  -webkit-font-smoothing: antialiased;
}
.slide {
  width: 1920px;
  height: 1080px;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  padding: 64px 80px 56px;
  position: relative;
}
.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0;
}
.hud-label {
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}
.accent-line {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent);
}
.section-label {
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  margin-bottom: 48px;
}

.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 56px;
}
.font-block {
  display: flex;
  align-items: center;
  gap: 60px;
  padding-bottom: 56px;
  border-bottom: 1px solid var(--border);
}
.font-block:last-child { border-bottom: none; padding-bottom: 0; }
.specimen {
  font-size: 120px;
  line-height: 1;
  color: var(--text);
  width: 180px;
  text-align: center;
  flex-shrink: 0;
}
.font-detail { flex: 1; }
.font-name {
  font-size: 32px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 6px;
}
.font-meta {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 20px;
  font-weight: 500;
}
.font-alpha {
  font-size: 14px;
  line-height: 1.8;
  color: var(--muted);
  letter-spacing: 0.06em;
}
</style></head><body>
<div class="slide">
  <div class="hud">
    <span class="hud-label">Typography</span>
    <span class="hud-label">03 — 03</span>
  </div>
  <div class="content">
    <div class="section-label">Brand Typefaces</div>
    
        <div class="font-block">
          <div class="specimen" style="font-family:'Satoshi',sans-serif;font-weight:900;">Aa</div>
          <div class="font-detail">
            <div class="font-name">Satoshi</div>
            <div class="font-meta">Display Typeface &nbsp;·&nbsp; 300 · 400 · 500 · 700 · 900</div>
            <div class="font-alpha" style="font-family:'Satoshi',sans-serif;font-weight:400;">
              ABCDEFGHIJKLMNOPQRSTUVWXYZ &nbsp; abcdefghijklmnopqrstuvwxyz &nbsp; 0123456789
            </div>
          </div>
        </div>
        <div class="font-block">
          <div class="specimen" style="font-family:'SF Mono',sans-serif;font-weight:400;">Aa</div>
          <div class="font-detail">
            <div class="font-name">SF Mono</div>
            <div class="font-meta">Mono Typeface &nbsp;·&nbsp; 400</div>
            <div class="font-alpha" style="font-family:'SF Mono',sans-serif;font-weight:400;">
              ABCDEFGHIJKLMNOPQRSTUVWXYZ &nbsp; abcdefghijklmnopqrstuvwxyz &nbsp; 0123456789
            </div>
          </div>
        </div>
  </div>
  <div class="accent-line"></div>
</div>
</body></html>
